version: "3.8"

services:
  app:
    build:
      context: .
      target: development
    image: myapp:dev
    container_name: myapp_dev
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG_CONFIG=false
      - VALIDATE_CONFIG=true
      - NODE_ENV=development
    ports:
      - "${SERVER_PORT:-3000}:3000"
      - "${METRICS_PORT:-9090}:9090"
    volumes:
      # Hot reload - mount source code
      - ./app:/app:delegated
      # Mount config for live editing
      - ./config:/app/config:ro
    secrets:
      - db_password
      - jwt_secret
      - stripe_api_key
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: myapp_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-myapp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: myapp_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  # Optional: Jaeger for tracing in development
  jaeger:
    image: jaegertracing/all-in-one:1.42
    container_name: myapp_jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"  # UI
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - app-network

secrets:
  db_password:
    file: ./secrets/db_password
  jwt_secret:
    file: ./secrets/jwt_secret
  stripe_api_key:
    file: ./secrets/stripe_api_key

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
