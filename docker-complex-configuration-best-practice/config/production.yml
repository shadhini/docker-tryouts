# Production environment overrides
# These values override base.yml for production

server:
  timeout_ms: 30000
  body_limit: 5mb

database:
  ssl: true
  pool:
    min: 5
    max: 25
    idle_timeout_ms: 30000
  migrations:
    auto_run: false  # Manual migrations in prod

redis:
  mode: cluster
  connection_timeout_ms: 3000
  retry_attempts: 5

logging:
  level: info
  format: json  # Structured logs for log aggregation

monitoring:
  enabled: true
  tracing:
    enabled: true
    service_name: myapp-production

api:
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst: 10
  cors:
    origins: https://app.example.com,https://www.example.com
    credentials: true
  authentication:
    jwt:
      expiry: 2h  # Shorter expiry in production

features:
  new_ui: false
  beta_api: false
  experimental_cache: false

cache:
  enabled: true
  ttl_seconds: 600
  max_entries: 10000
