version: "3.8"

services:
  app:
    build:
      context: .
      target: base
    image: myapp:${APP_VERSION:-latest}
    environment:
      - ENVIRONMENT=production
      - DEBUG_CONFIG=false
      - VALIDATE_CONFIG=true
      - NODE_ENV=production
      # All other config from secrets or external config
    env_file:
      - .env.production  # Not in repo, injected by CI/CD
    ports:
      - "3000:3000"
    secrets:
      - db_password
      - jwt_secret
      - stripe_api_key
      - sendgrid_api_key
      - aws_access_key_id
      - aws_secret_access_key
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
  stripe_api_key:
    external: true
  sendgrid_api_key:
    external: true
  aws_access_key_id:
    external: true
  aws_secret_access_key:
    external: true

networks:
  app-network:
    driver: overlay
